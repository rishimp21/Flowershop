<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login_Form</title>
    <link rel="stylesheet" href="login_form.css">
</head>
<body>
    <form action="welcome.html">
        <div class="card">
        <h1>Login</h1>
        <div class="field-group">
            <label>Username</label>
            <input type="text" placeholder="Type Your Username" required>
        </div>
        <div class="field-group">
            <label>Password</label>
            <input type="password" placeholder="Type Your Password" required>
        </div>
        <div class="forgot-row">
            <a href="#">Forgot Password</a>
        </div>
        <button type="submit" class="btn-login">LOGIN</button>
        <div class="signup-divider">Or Sign Up Using</div>
        <button class="btn-signup" onclick="window.location.href='signup_form.html'">SIGN UP</button>
    </div>
    </form>
</body>
</html>
